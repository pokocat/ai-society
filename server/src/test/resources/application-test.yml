spring:
  # 测试同样以 scp_app 连接（验证 DML 降权不破坏功能）；迁移用属主 scp
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/scp_test
    username: scp_app
    password: scp_app_pw
  flyway:
    url: jdbc:postgresql://127.0.0.1:5432/scp_test
    user: scp
    password: scp_dev_pw
    placeholders:
      # 测试保留演示数据（部分用例登录演示账号 / 用种子群）；生产默认 clean
      seedmode: demo

# 测试环境显式开启 mock 注入口/演示支付（生产默认 fail-closed，见 application.yml）
scp:
  mock-endpoints:
    enabled: true
  mp:
    mock-pay-enabled: true
