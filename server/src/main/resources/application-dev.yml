# 本地开发/演示 profile：开启 mock 注入口与演示支付，便于 smoke.sh / mp-e2e.sh 端到端演示。
# 用法：SPRING_PROFILES_ACTIVE=dev mvn spring-boot:run
# 生产（默认 profile）这些开关一律 fail-closed（见 application.yml），并由 ProdSafetyGuard 在 prod profile 下强制校验。
spring:
  flyway:
    placeholders:
      # dev 保留 V2 演示数据（4 项目/演示账号/会员/群…）；生产默认 clean 清空
      seedmode: demo
scp:
  mock-endpoints:
    enabled: true
  mp:
    mock-pay-enabled: true
