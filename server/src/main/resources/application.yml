spring:
  application:
    name: fenglema-scp-server
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/scp_dev
    username: scp
    password: scp_dev_pw
    hikari:
      maximum-pool-size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

scp:
  jwt:
    secret: "fenglema-scp-dev-secret-key-change-in-production-0123456789abcdef"
    ttl-hours: 72
  reservation:
    ttl-minutes: 30

logging:
  level:
    com.fenglema.scp: INFO
