spring:
  application:
    name: fenglema-scp-server
  # 运行时以 scp_app 连接（仅 DML，无法 DROP 审计触发器，CLAUDE.md §6）
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/scp_dev
    username: scp_app
    password: scp_app_pw
    hikari:
      maximum-pool-size: 20
  # 迁移（DDL）单独用属主 scp 连接
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://127.0.0.1:5432/scp_dev
    user: scp
    password: scp_dev_pw

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

scp:
  jwt:
    secret: "fenglema-scp-dev-secret-key-change-in-production-0123456789abcdef"
    ttl-hours: 72
  reservation:
    ttl-minutes: 30
  wecom:
    # 企微「内部群机器人」webhook（官方文档 91770，真实通道）：
    # 在企微内部运营群添加群机器人 → 复制 webhook 地址填到这里（或设 env）。
    # 留空=跳过通知（开发/CI）。注意：官方限制机器人仅内部群可用，客户群不可加。
    ops-robot-webhook: ${SCP_WECOM_OPS_ROBOT_WEBHOOK:}
  mp:
    # 会员小程序默认权益落地项目（M3b 单项目；多项目切换 M4）
    default-project: flm-membership

logging:
  level:
    com.fenglema.scp: INFO
